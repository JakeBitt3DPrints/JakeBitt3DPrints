<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-34HRY5BP01"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-34HRY5BP01');
  </script>

  <meta charset="UTF-8" />
  <title>Contact | JakeBitt3DPrints</title>
  <meta name="description" content="Get in touch with JakeBitt3DPrints for custom 3D printing projects, quotes, or questions." />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="view-transition" content="same-origin">

  <!-- THEME: inline bg on html before any paint — eliminates white flash -->
  <style>html { background: #f5f5f5; } html[data-theme="dark"] { background: #111827; }</style>
  <script>
    (function() {
      try {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch(e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    /* ── TOKENS ── */
    :root {
      --bg:          #f5f5f5;
      --bg-alt:      #ffffff;
      --text:        #111111;
      --muted:       #4b5563;
      --accent:      #2563eb;
      --border:      #e5e7eb;
      --nav-bg:      #ffffff;
      --nav-text:    #111111;
      --nav-active-bg:   #111111;
      --nav-active-text: #ffffff;
      --footer-bg:   #ffffff;
      --shadow:      0 10px 25px rgba(15,23,42,0.08);
      --radius:      20px;
      --font-head:   'DM Serif Display', Georgia, serif;
      --font-body:   'DM Sans', system-ui, sans-serif;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-l: env(safe-area-inset-left,   0px);
      --safe-r: env(safe-area-inset-right,  0px);
    }
    :root[data-theme="dark"] {
      --bg:          #111827;
      --bg-alt:      #020617;
      --text:        #f9fafb;
      --muted:       #d1d5db;
      --accent:      #9ca3af;
      --border:      #1f2937;
      --nav-bg:      #020617;
      --nav-text:    #e5e7eb;
      --nav-active-bg:   #e5e7eb;
      --nav-active-text: #020617;
      --footer-bg:   #020617;
      --shadow:      0 10px 25px rgba(0,0,0,0.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { overflow-x: hidden; max-width: 100%; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      max-width: 100%;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    button, a, [role="button"] { touch-action: manipulation; }

    /* ── PAGE FADE TRANSITION ── */
    @keyframes vt-fade-in  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes vt-fade-out { from { opacity: 1; } to { opacity: 0; } }
    ::view-transition-old(root) { animation: vt-fade-out 0.22s ease forwards; }
    ::view-transition-new(root) { animation: vt-fade-in 0.28s ease forwards; }

    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .site-shell { animation: pageFadeIn 0.45s cubic-bezier(0.4,0,0.2,1) both; }

    /* ── ENTRANCE ANIMATIONS ── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate { animation: slideUp 0.45s cubic-bezier(0.4,0,0.2,1) both; }
    .d1 { animation-delay: 0.05s; }
    .d2 { animation-delay: 0.12s; }
    .d3 { animation-delay: 0.19s; }

    /* ── LAYOUT SHELL ── */
    .site-shell {
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 24px calc(20px + var(--safe-r)) 32px calc(20px + var(--safe-l));
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── BRAND BAR ── */
    .brand-bar { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
    .brand-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .brand-logo {
      width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; background: var(--bg-alt);
      overflow: hidden; padding: 4px; flex-shrink: 0;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }
    .brand-logo img { width: 100%; height: 100%; object-fit: contain; filter: invert(0); transition: filter 0.3s ease; }
    :root[data-theme="dark"] .brand-logo img { filter: invert(1); }
    .brand-text { display: flex; flex-direction: column; gap: 2px; }
    .brand-name { font-weight: 700; font-size: 1.05rem; color: var(--text); }
    .brand-tagline { font-size: 0.82rem; color: var(--muted); line-height: 1.3; }

    /* ── NAV ── */
    .nav-wrap { flex-shrink: 0; }
    nav {
      display: flex; align-items: center; gap: 4px; padding: 5px 8px;
      border-radius: 999px; background: var(--nav-bg); border: 1px solid var(--border);
      box-shadow: var(--shadow);
      /* Scroll internally, never leak to page */
      overflow-x: auto; overflow-y: visible;
      scrollbar-width: none; -ms-overflow-style: none;
      max-width: 100%;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }
    nav::-webkit-scrollbar { display: none; }
    nav a {
      text-decoration: none; font-size: 0.88rem; font-weight: 600;
      padding: 7px 14px; border-radius: 999px; color: var(--nav-text);
      white-space: nowrap; flex-shrink: 0;
      transition: background-color 0.22s ease, color 0.22s ease, transform 0.12s ease;
    }
    nav a:hover:not(.active) { background-color: rgba(148,163,184,0.16); }
    nav a:active { transform: scale(0.95); }
    nav a.active { background-color: var(--nav-active-bg); color: var(--nav-active-text); }

    /* ── CARD ── */
    .page-card {
      border-radius: var(--radius); background: var(--bg-alt); border: 1px solid var(--border);
      box-shadow: var(--shadow); padding: 32px;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }
    .eyebrow {
      font-size: 0.74rem; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--muted); font-weight: 600; margin-bottom: 10px;
    }
    .page-title {
      font-family: var(--font-head); font-size: clamp(1.5rem, 5vw, 2rem);
      line-height: 1.2; margin-bottom: 24px; color: var(--text);
    }

    /* ── CONTACT FORM ── */
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-row-full { grid-column: 1 / -1; }
    .form-label { font-size: 0.9rem; font-weight: 600; color: var(--text); }
    .form-input, .form-textarea {
      width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px;
      font-size: 1rem; font-family: var(--font-body); background: var(--bg); color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.3s ease; outline: none;
    }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .form-textarea { min-height: 140px; resize: vertical; }

    .btn-primary {
      background-color: var(--accent); color: #ffffff; border: 1px solid var(--accent);
      padding: 12px 28px; font-size: 0.95rem; font-weight: 600; border-radius: 999px;
      cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-body);
      transition: opacity 0.18s ease, transform 0.12s ease;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.97); }
    :root[data-theme="dark"] .btn-primary { background-color: #4b5563; border-color: #4b5563; }

    .alt-contact { margin-top: 32px; padding-top: 32px; border-top: 1px solid var(--border); }
    .alt-contact h3 { font-family: var(--font-head); font-size: 1.3rem; margin-bottom: 12px; }
    .alt-contact p { color: var(--muted); line-height: 1.6; }

    /* ── FOOTER ── */
    footer {
      width: 100vw; position: relative; left: 50%; right: 50%;
      margin-left: -50vw; margin-right: -50vw;
      background-color: var(--footer-bg); border-top: 1px solid var(--border);
      padding: 16px calc(20px + var(--safe-r)) calc(16px + var(--safe-b)) calc(20px + var(--safe-l));
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }
    .footer-inner {
      max-width: 960px; margin: 0 auto; display: flex; flex-wrap: wrap;
      align-items: center; gap: 14px; justify-content: space-between;
    }
    .footer-left { font-size: 0.82rem; color: var(--muted); }
    .footer-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .social-links { display: flex; align-items: center; gap: 6px; }
    .social-links a {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border); text-decoration: none;
      font-size: 1rem; color: var(--muted);
      transition: background-color 0.15s ease, transform 0.12s ease, border-color 0.15s ease;
    }
    .social-links a:hover { background-color: rgba(148,163,184,0.18); transform: translateY(-1px); }
    .social-links a:active { transform: scale(0.92); }
    .social-links a.facebook { color: #1877f2; }
    .social-links a.youtube  { color: #ff0000; }
    .social-links a.instagram i {
      background: linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .social-links a.tiktok i {
      background: linear-gradient(45deg,#25f4ee,#fe2c55);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .social-links a.snapchat { background-color: #fffc00; border-color: #fffc00; color: #000; }
    .social-links a.snapchat:hover { background-color: #facc15; }

    .theme-btn {
      display: inline-flex; align-items: center; gap: 6px;
      border-radius: 999px; border: 1px solid var(--border);
      padding: 6px 13px; font-size: 0.8rem; color: var(--muted);
      cursor: pointer; background: transparent;
      font-family: var(--font-body); min-height: 36px;
      transition: background-color 0.15s ease, transform 0.12s ease, border-color 0.3s ease;
    }
    .theme-btn:hover { background-color: rgba(148,163,184,0.18); transform: translateY(-1px); }
    .theme-btn:active { transform: scale(0.95); }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      .brand-bar { flex-direction: column; align-items: flex-start; gap: 12px; }
      .nav-wrap { width: 100%; }
      nav { width: 100%; justify-content: space-between; }
      nav a { padding: 7px 10px; font-size: 0.82rem; }
      .contact-grid { grid-template-columns: 1fr; }
      .page-card { padding: 24px 20px; }
      .footer-inner { flex-direction: column; align-items: flex-start; gap: 10px; }
    }
    @media (max-width: 400px) {
      nav a { padding: 6px 8px; font-size: 0.78rem; }
    }
  </style>
</head>

<body>
  <div class="site-shell">

    <header class="brand-bar animate d1">
      <div class="brand-left">
        <div class="brand-logo">
          <img src="https://raw.githubusercontent.com/JakeBitt3DPrints/JakeBitt3DPrints/refs/heads/main/jbprintslogotransparentsmall.png" alt="JakeBitt3DPrints logo">
        </div>
        <div class="brand-text">
          <div class="brand-name">JakeBitt3DPrints</div>
          <div class="brand-tagline">Bringing your imagination to life, one layer at a time.</div>
        </div>
      </div>
      <div class="nav-wrap">
        <nav aria-label="Main navigation">
          <a href="/">Home</a>
          <a href="gallery">Gallery</a>
          <a href="shop">Shop</a>
          <a href="calendar">Calendar</a>
          <a href="contact" class="active">Contact</a>
        </nav>
      </div>
    </header>

    <main class="page-card animate d2">
      <div class="eyebrow">Get In Touch</div>
      <h1 class="page-title">Ready to start your project?</h1>

      <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
        <input type="hidden" name="access_key" value="a8d930c0-d1fe-423a-840f-35cae1bd0bbb">

        <div class="contact-grid">
          <div class="form-group">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" id="name" name="name" class="form-input" placeholder="Your name" required>
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="email@example.com" required>
          </div>

          <div class="form-group form-row-full">
            <label for="message" class="form-label">Project Details</label>
            <textarea id="message" name="message" class="form-textarea" placeholder="Tell us about your 3D printing project, dimensions, materials needed, or timeline..." required></textarea>
          </div>
        </div>

        <button type="submit" class="btn-primary">
          <i class="fa-solid fa-paper-plane"></i>
          <span>Send Message</span>
        </button>
      </form>

      <div class="alt-contact">
        <h3>Or reach us directly</h3>
        <p>
          Email: <a href="mailto:contact@jakebitt3dprints.com" style="color: var(--accent); text-decoration: none; font-weight: 500;">contact@jakebitt3dprints.com</a><br>
          Check our <a href="calendar" style="color: var(--accent); text-decoration: none; font-weight: 500;">calendar</a> for availability.
        </p>
      </div>
    </main>

  </div>

  <footer>
    <div class="footer-inner animate d3">
      <div class="footer-left">&copy; 2025 JakeBitt3DPrints. All rights reserved.</div>
      <div class="footer-right">
        <div class="social-links" aria-label="Social media links">
          <a href="https://m.facebook.com/61579251184929/" target="_blank" rel="noopener" class="facebook" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
          <a href="https://www.instagram.com/jakebitt3dprints/" target="_blank" rel="noopener" class="instagram" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
          <a href="https://www.youtube.com/@JakeBitt3DPrints" target="_blank" rel="noopener" class="youtube" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
          <a href="https://www.tiktok.com/@jakebitt3dprints" target="_blank" rel="noopener" class="tiktok" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
          <a href="https://www.snapchat.com/@jakebitt3dprint" target="_blank" rel="noopener" class="snapchat" aria-label="Snapchat"><i class="fab fa-snapchat"></i></a>
        </div>
        <button type="button" class="theme-btn" id="themeToggle" aria-label="Toggle theme">
          <span id="themeIcon">🌙</span>
          <span id="themeLabel">Dark mode</span>
        </button>
      </div>
    </div>
  </footer>

  <script>
  (function() {

    /* ── THEME TOGGLE ── */
    var root   = document.documentElement;
    var toggle = document.getElementById('themeToggle');
    var tIcon  = document.getElementById('themeIcon');
    var tLabel = document.getElementById('themeLabel');

    function syncTheme() {
      var dark = root.getAttribute('data-theme') === 'dark';
      tIcon.textContent  = dark ? '☀️' : '🌙';
      tLabel.textContent = dark ? 'Light mode' : 'Dark mode';
    }
    syncTheme();

    toggle.addEventListener('click', function() {
      var dark = root.getAttribute('data-theme') === 'dark';
      if (dark) {
        root.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        root.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
      syncTheme();
    });

    /* ── SMOOTH PAGE TRANSITIONS ── */
    var links = document.querySelectorAll('nav a, .alt-contact a');
    links.forEach(function(link) {
      link.addEventListener('click', function(e) {
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('mailto:') || link.target === '_blank') return;

        var url;
        try { url = new URL(href, window.location.href); } catch(err) { return; }
        if (url.origin !== window.location.origin) return;

        if (document.startViewTransition) {
          e.preventDefault();
          document.startViewTransition(function() { window.location.href = href; });
          return;
        }

        e.preventDefault();
        var shell = document.querySelector('.site-shell');
        if (shell) {
          shell.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
          shell.style.opacity    = '0';
          shell.style.transform  = 'translateY(-8px)';
        }
        document.querySelector('footer').style.transition = 'opacity 0.22s ease';
        document.querySelector('footer').style.opacity    = '0';
        setTimeout(function() { window.location.href = href; }, 230);
      });
    });

  })();
  </script>
</body>
</html>
